# Netlify build config for Docusaurus docs site (docs.mannyroy.com).
# In Netlify UI: set "Base directory" to docs-site so this file is used.

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"

# Custom domain is set in Netlify: Domain settings → Add custom domain → docs.mannyroy.com
# DNS: add CNAME record for docs (or docs.mannyroy.com) pointing to the Netlify subdomain (e.g. random-name.netlify.app).
